version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: college_portal_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: college_portal
    volumes:
      - mongodb_data:/data/db
    networks:
      - college_network

  backend:
    build: .
    container_name: college_portal_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/college_portal
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: your_super_secret_jwt_key_12345
      ENCRYPTION_KEY: your_32_character_encryption_key
    depends_on:
      - mongodb
    networks:
      - college_network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  college_network:
    driver: bridge
